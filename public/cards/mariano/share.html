<style>
:root {
  --bg: #000000;
  --surface: #0e0e0e;
  --surface-2: #161616;
  --line: rgba(255,255,255,0.08);
  --line-2: rgba(255,255,255,0.16);
  --text: #ffffff;
  --text-2: #8d8d8d;
  --text-3: #5a5a5a;
  --violet: #8A5EFF;
  --violet-light: #BCA3FF;
  --violet-glow: rgba(138,94,255,0.22);
  --font-display: 'Antonio', sans-serif;
  --font-body: 'Figtree', sans-serif;
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
}
body {
  min-height: 100svh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: clamp(20px, 5vw, 48px) 18px calc(32px + env(safe-area-inset-bottom));
  background:
    radial-gradient(120% 70% at 50% 0%, var(--violet-glow) 0%, transparent 55%),
    var(--bg);
}
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }

.grain {
  position: fixed; inset: -50%;
  width: 200%; height: 200%;
  z-index: 9999; pointer-events: none;
  opacity: 0.035;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  animation: grain 8s steps(10) infinite;
}
@keyframes grain { 0%,100%{transform:translate(0,0)} 20%{transform:translate(-5%,-8%)} 40%{transform:translate(-3%,6%)} 60%{transform:translate(4%,-4%)} 80%{transform:translate(-2%,7%)} }

.wrap {
  width: 100%;
  max-width: 400px;
  text-align: center;
  animation: rise 0.6s var(--ease) both;
}
@keyframes rise { from { opacity:0; transform:translateY(16px) } to { opacity:1; transform:none } }

.eyebrow {
  font-weight: 600;
  font-size: 0.72rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--violet-light);
  margin-bottom: 8px;
  display: inline-flex;
  align-items: center;
  gap: 7px;
}
.eyebrow::before { content:""; width:6px; height:6px; border-radius:50%; background:var(--violet); box-shadow:0 0 10px var(--violet); }
.title {
  font-family: var(--font-display);
  text-transform: uppercase;
  letter-spacing: -0.01em;
  font-weight: 600;
  font-size: clamp(1.6rem, 7vw, 2rem);
  line-height: 1;
  margin-bottom: 6px;
}
.sub { color: var(--text-2); font-size: 0.92rem; margin-bottom: 24px; }

.qr-frame {
  position: relative;
  width: 100%;
  max-width: 280px;
  margin: 0 auto 20px;
  aspect-ratio: 1;
  background: #fff;
  border-radius: 26px;
  padding: 18px;
  box-shadow: 0 24px 60px rgba(0,0,0,0.55);
}
.qr-frame svg { width: 100%; height: 100%; display: block; }
.qr-pane { width: 100%; height: 100%; }
.qr-pane[hidden] { display: none; }

.toggle {
  display: inline-flex;
  padding: 4px;
  background: var(--surface-2);
  border: 1px solid var(--line);
  border-radius: 9999px;
  margin-bottom: 14px;
}
.toggle-btn {
  padding: 9px 26px;
  border-radius: 9999px;
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--text-2);
  transition: color 0.2s, background 0.2s;
}
.toggle-btn.active { background: #fff; color: #000; }
.view-link {
  display: inline-block;
  margin-top: 18px;
  font-size: 0.85rem;
  color: var(--text-2);
  border-bottom: 1px solid var(--line-2);
  padding-bottom: 2px;
  transition: color 0.2s;
}
.view-link:hover { color: var(--violet-light); }

@media (prefers-reduced-motion: reduce) { .grain, .wrap { animation: none; } }
</style>
</head>
