<style>
:root {
  --bg: #000000;
  --surface: #0e0e0e;
  --surface-2: #161616;
  --line: rgba(255,255,255,0.08);
  --line-2: rgba(255,255,255,0.16);
  --text: #ffffff;
  --text-2: #8d8d8d;
  --text-3: #5a5a5a;
  --violet: #8A5EFF;
  --violet-light: #BCA3FF;
  --violet-glow: rgba(138,94,255,0.22);
  --font-display: 'Antonio', sans-serif;
  --font-body: 'Figtree', sans-serif;
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
body {
  min-height: 100svh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: clamp(16px, 4vw, 48px) 16px calc(40px + env(safe-area-inset-bottom));
  background: var(--bg);
}

a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }

/* film grain */
.grain {
  position: fixed; inset: -50%;
  width: 200%; height: 200%;
  z-index: 9999; pointer-events: none;
  opacity: 0.035;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  animation: grain 8s steps(10) infinite;
}
@keyframes grain {
  0%,100% { transform: translate(0,0) }
  20% { transform: translate(-5%,-8%) }
  40% { transform: translate(-3%,6%) }
  60% { transform: translate(4%,-4%) }
  80% { transform: translate(-2%,7%) }
}

/* fondo de blobs violeta animados, igual que el hero del sitio */
.bg { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
.blob { position: absolute; border-radius: 50%; filter: blur(100px); will-change: transform; }
.blob--1 {
  width: 70vw; height: 70vw; max-width: 540px; max-height: 540px;
  top: -22%; left: -24%;
  background: radial-gradient(circle, rgba(138,94,255,0.50) 0%, transparent 70%);
  animation: blob-float-1 18s -5s infinite alternate ease-in-out;
}
.blob--2 {
  width: 55vw; height: 55vw; max-width: 440px; max-height: 440px;
  bottom: -12%; right: -22%;
  background: radial-gradient(circle, rgba(138,94,255,0.42) 0%, transparent 70%);
  animation: blob-float-2 22s -2s infinite alternate ease-in-out;
}
@keyframes blob-float-1 {
  0%   { transform: translate(0,0) scale(1); }
  33%  { transform: translate(15vw,10vh) scale(1.1); }
  66%  { transform: translate(-10vw,5vh) scale(0.9); }
  100% { transform: translate(0,0) scale(1); }
}
@keyframes blob-float-2 {
  0%   { transform: translate(0,0) scale(1); }
  33%  { transform: translate(-15vw,-10vh) scale(0.8); }
  66%  { transform: translate(5vw,-15vh) scale(1.1); }
  100% { transform: translate(0,0) scale(1); }
}

.card {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 440px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  animation: rise 0.7s var(--ease) both;
}
@keyframes rise { from { opacity: 0; transform: translateY(16px) } to { opacity: 1; transform: none } }

/* ───────── HERO ───────── */
.hero {
  position: relative;
  border-radius: 28px;
  overflow: hidden;
  background:
    radial-gradient(140% 120% at 85% 0%, rgba(138,94,255,0.28) 0%, transparent 50%),
    linear-gradient(160deg, #1c1c1c 0%, #0a0a0a 100%);
  border: 1px solid var(--line);
  padding: 30px 26px 26px;
}
.hero-eyebrow {
  font-family: var(--font-body);
  font-weight: 600;
  font-size: 0.72rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--violet-light);
  margin-bottom: 14px;
  display: inline-flex;
  align-items: center;
  gap: 7px;
}
.hero-eyebrow::before {
  content: "";
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--violet);
  box-shadow: 0 0 10px var(--violet);
}
.hero-grid {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  gap: 18px;
}
.name {
  font-family: var(--font-display);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: -0.02em;
  line-height: 1;
  font-size: clamp(1.6rem, 7vw, 2.2rem);
  margin-bottom: 6px;
}
.role { color: var(--text-2); font-size: 1rem; line-height: 1.35; font-weight: 400; }
.role strong { color: var(--text); font-weight: 600; }

.avatar {
  position: relative;
  width: 84px; height: 84px;
  flex: 0 0 auto;
  border-radius: 50%;
  padding: 2px;
  background: linear-gradient(150deg, var(--violet) 0%, transparent 55%);
}
.avatar-inner {
  width: 100%; height: 100%;
  border-radius: 50%;
  overflow: hidden;
  background: var(--surface-2);
  display: grid;
  place-items: center;
}
.avatar-inner img { width: 100%; height: 100%; object-fit: cover; display: block; }
.avatar-fallback {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 2rem;
  color: var(--violet-light);
  letter-spacing: 0.02em;
}

/* ───────── CONTACT ROWS ───────── */
.contacts { display: flex; flex-direction: column; gap: 10px; }
.row {
  display: flex;
  align-items: center;
  gap: 15px;
  padding: 15px 18px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 18px;
  transition: border-color 0.25s var(--ease), background 0.25s var(--ease), transform 0.25s var(--ease);
}
.row:hover, .row:active {
  border-color: var(--line-2);
  background: var(--surface-2);
  transform: translateY(-2px);
}
.row-icon {
  width: 42px; height: 42px;
  flex: 0 0 auto;
  border-radius: 12px;
  display: grid;
  place-items: center;
  background: rgba(138,94,255,0.12);
  color: var(--violet-light);
}
.row-icon svg { width: 20px; height: 20px; }
.row-text { min-width: 0; }
.row-label { font-size: 0.72rem; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 2px; }
.row-value { font-size: 1rem; color: var(--text); font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.row-arrow { margin-left: auto; color: var(--text-3); flex: 0 0 auto; transition: transform 0.25s var(--ease), color 0.25s; }
.row:hover .row-arrow { color: var(--violet-light); transform: translateX(3px); }

/* ───────── ACTION ───────── */
.actions { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 9px;
  padding: 16px 22px;
  border-radius: 9999px;
  font-size: 1rem;
  font-weight: 600;
  transition: transform 0.2s var(--ease), background 0.25s, border-color 0.25s, color 0.25s;
}
.btn svg { width: 19px; height: 19px; }
.btn:active { transform: scale(0.97); }
.btn-primary { background: #fff; color: #000; }
.btn-primary:hover { background: var(--violet); color: #fff; }

.footer {
  text-align: center;
  margin-top: 12px;
  font-size: 0.78rem;
  color: var(--text-3);
  letter-spacing: 0.02em;
}
.footer a { color: var(--text-2); border-bottom: 1px solid var(--line-2); padding-bottom: 1px; }
.footer a:hover { color: var(--violet-light); }

/* toast */
.toast {
  position: fixed;
  left: 50%; bottom: calc(28px + env(safe-area-inset-bottom));
  transform: translateX(-50%) translateY(20px);
  background: #fff; color: #000;
  font-weight: 600; font-size: 0.9rem;
  padding: 12px 22px;
  border-radius: 9999px;
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s var(--ease), transform 0.3s var(--ease);
  box-shadow: 0 12px 40px rgba(0,0,0,0.5);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (prefers-reduced-motion: reduce) {
  .grain { animation: none; }
  .card { animation: none; }
  .blob { animation: none; }
}
</style>
</head>
<body>

<script>
(function () {
  "use strict";

  // vCard idéntica a la que codifica el QR Offline de la pantalla de compartir
  var VCARD = [
    "BEGIN:VCARD",
    "VERSION:3.0",
    "N:Noceti;Mariano;;;",
    "FN:Mariano Noceti",
    "ORG:Yacaré",
    "TITLE:Digital Entrepreneur",
    "TEL;TYPE=CELL,VOICE:+15513713633",
    "EMAIL;TYPE=WORK:mariano@yacare.io",
    "URL:https://yacare.io",
    "X-SOCIALPROFILE;TYPE=linkedin:https://www.linkedin.com/in/mariano-noceti",
    "X-SOCIALPROFILE;TYPE=instagram:https://www.instagram.com/mariannoceti",
    "END:VCARD"
  ].join("\n");

  var toastEl = document.getElementById("toast");
  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    clearTimeout(toast._t);
    toast._t = setTimeout(function () { toastEl.classList.remove("show"); }, 2200);
  }

  document.getElementById("saveBtn").addEventListener("click", function () {
    try {
      var blob = new Blob([VCARD], { type: "text/vcard;charset=utf-8" });
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = "Mariano-Noceti.vcf";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(function () { URL.revokeObjectURL(url); }, 1500);
      toast("Contacto descargado");
    } catch (e) {
      window.location.href = "data:text/vcard;charset=utf-8," + encodeURIComponent(VCARD);
    }
  });
})();
</script>
