<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<meta name="description" content="Tarjeta digital de Mariano Noceti, Digital Entrepreneur en Yacaré. Guardá mi contacto en un toque.">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Antonio:wght@300..700&family=Figtree:ital,wght@0,300..800;1,300..600&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #000000;
  --surface: #0e0e0e;
  --surface-2: #161616;
  --line: rgba(255,255,255,0.08);
  --line-2: rgba(255,255,255,0.16);
  --text: #ffffff;
  --text-2: #8d8d8d;
  --text-3: #5a5a5a;
  --violet: #8A5EFF;
  --violet-light: #BCA3FF;
  --violet-glow: rgba(138,94,255,0.22);
  --font-display: 'Antonio', sans-serif;
  --font-body: 'Figtree', sans-serif;
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
body {
  min-height: 100svh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: clamp(16px, 4vw, 48px) 16px calc(40px + env(safe-area-inset-bottom));
  background:
    radial-gradient(120% 70% at 50% -10%, var(--violet-glow) 0%, transparent 55%),
    var(--bg);
}

a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }

/* film grain */
.grain {
  position: fixed; inset: -50%;
  width: 200%; height: 200%;
  z-index: 9999; pointer-events: none;
  opacity: 0.035;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  animation: grain 8s steps(10) infinite;
}
@keyframes grain {
  0%,100% { transform: translate(0,0) }
  20% { transform: translate(-5%,-8%) }
  40% { transform: translate(-3%,6%) }
  60% { transform: translate(4%,-4%) }
  80% { transform: translate(-2%,7%) }
}

.card {
  width: 100%;
  max-width: 440px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  animation: rise 0.7s var(--ease) both;
}
@keyframes rise { from { opacity: 0; transform: translateY(16px) } to { opacity: 1; transform: none } }

/* ───────── HERO ───────── */
.hero {
  position: relative;
  border-radius: 28px;
  overflow: hidden;
  background:
    radial-gradient(140% 120% at 85% 0%, rgba(138,94,255,0.28) 0%, transparent 50%),
    linear-gradient(160deg, #1c1c1c 0%, #0a0a0a 100%);
  border: 1px solid var(--line);
  padding: 30px 26px 26px;
}
.hero-eyebrow {
  font-family: var(--font-body);
  font-weight: 600;
  font-size: 0.72rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--violet-light);
  margin-bottom: 14px;
  display: inline-flex;
  align-items: center;
  gap: 7px;
}
.hero-eyebrow::before {
  content: "";
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--violet);
  box-shadow: 0 0 10px var(--violet);
}
.hero-grid {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  gap: 18px;
}
.name {
  font-family: var(--font-display);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: -0.02em;
  line-height: 0.95;
  font-size: clamp(2.1rem, 9vw, 2.7rem);
  margin-bottom: 8px;
}
.role { color: var(--text-2); font-size: 1rem; line-height: 1.35; font-weight: 400; }
.role strong { color: var(--text); font-weight: 600; }

.avatar {
  position: relative;
  width: 92px; height: 92px;
  flex: 0 0 auto;
  border-radius: 50%;
  padding: 2px;
  background: linear-gradient(150deg, var(--violet) 0%, transparent 55%);
}
.avatar-inner {
  width: 100%; height: 100%;
  border-radius: 50%;
  overflow: hidden;
  background: var(--surface-2);
  display: grid;
  place-items: center;
}
.avatar-inner img { width: 100%; height: 100%; object-fit: cover; display: block; }
.avatar-fallback {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 2rem;
  color: var(--violet-light);
  letter-spacing: 0.02em;
}

/* ───────── CONTACT ROWS ───────── */
.contacts { display: flex; flex-direction: column; gap: 10px; }
.row {
  display: flex;
  align-items: center;
  gap: 15px;
  padding: 15px 18px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 18px;
  transition: border-color 0.25s var(--ease), background 0.25s var(--ease), transform 0.25s var(--ease);
}
.row:hover, .row:active {
  border-color: var(--line-2);
  background: var(--surface-2);
  transform: translateY(-2px);
}
.row-icon {
  width: 42px; height: 42px;
  flex: 0 0 auto;
  border-radius: 12px;
  display: grid;
  place-items: center;
  background: rgba(138,94,255,0.12);
  color: var(--violet-light);
}
.row-icon svg { width: 20px; height: 20px; }
.row-text { min-width: 0; }
.row-label { font-size: 0.72rem; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 2px; }
.row-value { font-size: 1rem; color: var(--text); font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.row-arrow { margin-left: auto; color: var(--text-3); flex: 0 0 auto; transition: transform 0.25s var(--ease), color 0.25s; }
.row:hover .row-arrow { color: var(--violet-light); transform: translateX(3px); }

/* ───────── ACTIONS ───────── */
.actions { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 9px;
  padding: 16px 22px;
  border-radius: 9999px;
  font-size: 1rem;
  font-weight: 600;
  transition: transform 0.2s var(--ease), background 0.25s, border-color 0.25s, color 0.25s;
}
.btn svg { width: 19px; height: 19px; }
.btn:active { transform: scale(0.97); }
.btn-primary { background: #fff; color: #000; }
.btn-primary:hover { background: var(--violet); color: #fff; }
.actions-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.btn-ghost { background: transparent; color: #fff; border: 1px solid var(--line-2); }
.btn-ghost:hover { border-color: #fff; background: rgba(255,255,255,0.04); }

.footer {
  text-align: center;
  margin-top: 12px;
  font-size: 0.78rem;
  color: var(--text-3);
  letter-spacing: 0.02em;
}
.footer a { color: var(--text-2); border-bottom: 1px solid var(--line-2); padding-bottom: 1px; }
.footer a:hover { color: var(--violet-light); }

/* ───────── QR MODAL ───────── */
.modal {
  position: fixed; inset: 0;
  z-index: 100;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
.modal.open { display: flex; animation: fade 0.25s var(--ease); }
@keyframes fade { from { opacity: 0 } to { opacity: 1 } }
.modal-card {
  position: relative;
  width: 100%;
  max-width: 360px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 28px;
  padding: 26px 24px 22px;
  text-align: center;
  animation: pop 0.35s var(--ease);
}
@keyframes pop { from { opacity: 0; transform: scale(0.94) translateY(10px) } to { opacity: 1; transform: none } }
.modal-close {
  position: absolute; top: 14px; right: 14px;
  width: 34px; height: 34px;
  border-radius: 50%;
  display: grid; place-items: center;
  color: var(--text-2);
  background: var(--surface-2);
  transition: color 0.2s, background 0.2s;
}
.modal-close:hover { color: #fff; background: var(--line-2); }
.modal-title {
  font-family: var(--font-display);
  text-transform: uppercase;
  letter-spacing: 0.01em;
  font-weight: 500;
  font-size: 1.25rem;
  margin-bottom: 4px;
}
.modal-sub { font-size: 0.85rem; color: var(--text-2); margin-bottom: 18px; }

.qr-frame {
  position: relative;
  width: 100%;
  max-width: 240px;
  margin: 0 auto 18px;
  aspect-ratio: 1;
  background: #fff;
  border-radius: 22px;
  padding: 16px;
  box-shadow: 0 18px 50px rgba(0,0,0,0.55);
}
.qr-frame svg { width: 100%; height: 100%; display: block; }
.qr-pane { width: 100%; height: 100%; }
.qr-pane[hidden] { display: none; }
.qr-badge {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 17%; height: 17%;
  background: #fff;
  border-radius: 9px;
  display: grid;
  place-items: center;
  box-shadow: 0 0 0 5px #fff;
}
.qr-badge span {
  font-family: var(--font-display);
  font-weight: 700;
  color: var(--violet);
  font-size: 1.1rem;
  line-height: 1;
}

.toggle {
  display: inline-flex;
  padding: 4px;
  background: var(--surface-2);
  border: 1px solid var(--line);
  border-radius: 9999px;
  margin-bottom: 14px;
}
.toggle-btn {
  padding: 9px 24px;
  border-radius: 9999px;
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--text-2);
  transition: color 0.2s, background 0.2s;
}
.toggle-btn.active { background: #fff; color: #000; }
.qr-hint { font-size: 0.82rem; color: var(--text-2); line-height: 1.45; min-height: 2.5em; }

/* toast */
.toast {
  position: fixed;
  left: 50%; bottom: calc(28px + env(safe-area-inset-bottom));
  transform: translateX(-50%) translateY(20px);
  background: #fff; color: #000;
  font-weight: 600; font-size: 0.9rem;
  padding: 12px 22px;
  border-radius: 9999px;
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s var(--ease), transform 0.3s var(--ease);
  box-shadow: 0 12px 40px rgba(0,0,0,0.5);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (prefers-reduced-motion: reduce) {
  .grain { animation: none; }
  .card, .modal.open, .modal-card { animation: none; }
}
</style>
</head>

      <button class="toggle-btn" data-mode="offline" id="tgOffline">Offline</button>

<div class="toast" id="toast"></div>

<script>
(function () {
  "use strict";

  var URL_CARD = "https://yacare.io/cards/mariano";

  // vCard idéntica a la que codifica el QR Offline
  var VCARD = [
    "BEGIN:VCARD",
    "VERSION:3.0",
    "N:Noceti;Mariano;;;",
    "FN:Mariano Noceti",
    "ORG:Yacaré",
    "TITLE:Digital Entrepreneur",
    "TEL;TYPE=CELL,VOICE:+15513713633",
    "EMAIL;TYPE=WORK:mariano@yacare.io",
    "URL:https://yacare.io",
    "X-SOCIALPROFILE;TYPE=linkedin:https://www.linkedin.com/in/mariano-noceti",
    "X-SOCIALPROFILE;TYPE=instagram:https://www.instagram.com/mariannoceti",
    "END:VCARD"
  ].join("\n");

  var $ = function (id) { return document.getElementById(id); };

  function toast(msg) {
    var t = $("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(toast._t);
    toast._t = setTimeout(function () { t.classList.remove("show"); }, 2200);
  }

  // ---- Guardar contacto (.vcf) ----
  $("saveBtn").addEventListener("click", function () {
    try {
      var blob = new Blob([VCARD], { type: "text/vcard;charset=utf-8" });
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = "Mariano-Noceti.vcf";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(function () { URL.revokeObjectURL(url); }, 1500);
      toast("Contacto descargado");
    } catch (e) {
      // Fallback iOS antiguo
      window.location.href = "data:text/vcard;charset=utf-8," + encodeURIComponent(VCARD);
    }
  });

  // ---- Compartir ----
  $("shareBtn").addEventListener("click", async function () {
    var data = {
      title: "Mariano Noceti · Yacaré",
      text: "Esta es mi tarjeta digital.",
      url: URL_CARD
    };
    if (navigator.share) {
      try { await navigator.share(data); } catch (e) { /* cancelado */ }
      return;
    }
    try {
      await navigator.clipboard.writeText(URL_CARD);
      toast("Link copiado");
    } catch (e) {
      window.prompt("Copiá el link de la tarjeta:", URL_CARD);
    }
  });

  // ---- QR modal ----
  var modal = $("qrModal");
  function openQR() { modal.classList.add("open"); }
  function closeQR() { modal.classList.remove("open"); }

  $("qrBtn").addEventListener("click", openQR);
  $("qrClose").addEventListener("click", closeQR);
  modal.addEventListener("click", function (e) { if (e.target === modal) closeQR(); });
  document.addEventListener("keydown", function (e) { if (e.key === "Escape") closeQR(); });

  // ---- Toggle Online / Offline ----
  var HINTS = {
    online: "Apuntá la cámara y se abre mi tarjeta.",
    offline: "Apuntá la cámara y guardás mi contacto al toque. Funciona sin internet."
  };

  function setMode(mode) {
    var on = mode === "online";
    $("paneOnline").hidden = !on;
    $("paneOffline").hidden = on;
    // El logo central solo va sobre el QR Online (data corta, no afecta el escaneo).
    $("qrBadge").style.display = on ? "grid" : "none";
    $("tgOnline").classList.toggle("active", on);
    $("tgOffline").classList.toggle("active", !on);
    $("qrHint").textContent = HINTS[mode];
  }

  $("tgOnline").addEventListener("click", function () { setMode("online"); });
  $("tgOffline").addEventListener("click", function () { setMode("offline"); });
})();
</script>
